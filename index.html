<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тест ПДР України</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #162033;
      --muted: #64748b;
      --border: #dbe4f0;
      --accent: #2563eb;
      --accent-2: #1d4ed8;
      --correct: #16a34a;
      --correct-bg: #dcfce7;
      --wrong: #dc2626;
      --wrong-bg: #fee2e2;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: linear-gradient(135deg, #1e3a8f 0%, #2563eb 100%);
      color: white;
      padding: 28px 20px 22px;
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.22);
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .title {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }

    .subtitle {
      margin: 0;
      opacity: 0.95;
      font-size: 15px;
    }

    .container {
      max-width: 1100px;
      margin: 24px auto 48px;
      padding: 0 20px;
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .section-card {
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .section-card:hover {
      transform: translateY(-3px);
      border-color: #bcd0ff;
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.12);
    }

    .section-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      height: 42px;
      padding: 0 12px;
      border-radius: 999px;
      background: #e8f0ff;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 14px;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 20px;
      line-height: 1.25;
    }

    .section-desc {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .section-meta {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .practice-badge {
      display: inline-block;
      margin-top: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #fff7ed;
      color: #c2410c;
    }

    .hidden { display: none !important; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover { background: var(--accent-2); }

    .btn-secondary {
      background: #e8eef8;
      color: var(--text);
    }

    .btn-secondary:hover { background: #dbe7f5; }

    .section-head {
      margin-bottom: 18px;
    }

    .section-head h2 {
      margin: 0 0 8px;
      font-size: 26px;
    }

    .section-head p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .progress {
      flex: 1;
      height: 10px;
      background: #e6edf7;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #2563eb, #60a5fa);
      width: 0%;
      transition: width 0.25s ease;
    }

    .progress-text {
      min-width: 130px;
      text-align: right;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .question-card {
      margin-bottom: 18px;
    }

    .question-number {
      display: inline-block;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--accent);
      font-weight: 700;
      background: #edf4ff;
      padding: 6px 10px;
      border-radius: 999px;
    }

    .question-text {
      margin: 0 0 16px;
      font-size: 20px;
      line-height: 1.45;
      font-weight: 700;
    }

    .question-note {
      margin: 0 0 14px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #fff7ed;
      color: #9a3412;
      font-size: 14px;
      line-height: 1.45;
      border: 1px solid #fed7aa;
    }

    .answers {
      display: grid;
      gap: 10px;
    }

    .answer-btn {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      background: white;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      line-height: 1.45;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease;
    }

    .answer-btn:hover {
      transform: translateY(-1px);
      border-color: #a9c4ff;
      background: #f8fbff;
    }

    .answer-btn.selected {
      border-color: var(--accent);
      background: #eef4ff;
    }

    .answer-btn.correct {
      border-color: var(--correct);
      background: var(--correct-bg);
      color: #14532d;
    }

    .answer-btn.wrong {
      border-color: var(--wrong);
      background: var(--wrong-bg);
      color: #7f1d1d;
    }

    .answer-btn:disabled {
      cursor: default;
    }

    .nav-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 18px;
    }

    .result-box {
      text-align: center;
      padding: 28px 22px;
    }

    .result-score {
      font-size: 46px;
      font-weight: 800;
      color: var(--accent);
      margin: 8px 0 10px;
    }

    .result-meta {
      color: var(--muted);
      margin: 0 0 18px;
      font-size: 16px;
      line-height: 1.5;
    }

    .result-status {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .result-status.good {
      background: var(--correct-bg);
      color: #166534;
    }

    .result-status.bad {
      background: var(--wrong-bg);
      color: #991b1b;
    }

    @media (max-width: 700px) {
      .title { font-size: 22px; }
      .question-text { font-size: 18px; }

      .nav-row {
        flex-direction: column;
      }

      .progress-wrap {
        flex-direction: column;
        align-items: stretch;
      }

      .progress-text {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1 class="title">Тест ПДР України</h1>
      <p class="subtitle">Оберіть розділ і проходьте тестування по темах</p>
    </div>
  </header>

  <main class="container">
    <section id="sectionSelectView">
      <div class="section-grid" id="sectionGrid"></div>
    </section>

    <section id="quizView" class="hidden">
      <div class="toolbar">
        <button class="btn btn-secondary" id="backToSectionsBtn">← Назад до розділів</button>
      </div>

      <div class="section-head">
        <h2 id="quizSectionTitle"></h2>
        <p id="quizSectionDesc"></p>
      </div>

      <div class="progress-wrap">
        <div class="progress">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-text" id="progressText">1 / 1</div>
      </div>

      <div class="card question-card">
        <div class="question-number" id="questionNumber"></div>
        <p class="question-text" id="questionText"></p>
        <div class="question-note hidden" id="questionNote"></div>
        <div class="answers" id="answersContainer"></div>

        <div class="nav-row">
          <button class="btn btn-secondary" id="prevBtn">← Попереднє</button>
          <button class="btn btn-primary" id="nextBtn">Наступне →</button>
        </div>
      </div>
    </section>

    <section id="resultView" class="hidden">
      <div class="card result-box">
        <p class="section-number" style="margin:0 auto 10px;">✓</p>
        <h2 style="margin:0;">Результат тесту</h2>
        <div class="result-score" id="resultScore">0 / 0</div>
        <p class="result-meta" id="resultMeta"></p>
        <div class="result-status" id="resultStatus"></div>
        <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
          <button class="btn btn-secondary" id="retryBtn">Пройти ще раз</button>
          <button class="btn btn-primary" id="backHomeBtn">До розділів</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const sections = [
      {
        id: "general",
        number: "01",
        title: "Загальні положення",
        description: "Базові терміни, елементи дороги, учасники дорожнього руху.",
        questions: [
          { sourceNumber: 1, question: "Трамвайна колія – елемент дороги, призначений для руху рейкових транспортних засобів, який обмежується по ширині:", options: ["Спеціально виділеним вимощенням трамвайної лінії.", "Дорожньою розміткою.", "Відповіді, зазначені в пунктах 1 та 2."], correctAnswer: 2 },
          { sourceNumber: 2, question: "Елемент дороги, призначений для руху рейкових транспортних засобів, який обмежується по ширині спеціально виділеним вимощенням трамвайної лінії або дорожньою розміткою це:", options: ["Трамвайна колія.", "Удосконалене покриття.", "Смуга руху."], correctAnswer: 0 },
          { sourceNumber: 3, question: "По якому з наведених елементів дороги дозволено рух нерейкових транспортних засобів?", options: ["По тротуару.", "По трамвайній колії.", "По проїзній частині.", "Відповіді 2 та 3."], correctAnswer: 3 },
          { sourceNumber: 4, question: "Чи належить до проїзної частини велосипедна смуга?", options: ["Так, належить.", "Нi, не належить."], correctAnswer: 0 },
          { sourceNumber: 5, question: "Для руху яких транспортних засобів призначена проїзна частина?", options: ["Нерейкових транспортних засобів.", "Рейкових транспортних засобів.", "Нерейкових та рейкових транспортних засобів."], correctAnswer: 0 },
          { sourceNumber: 6, question: "Що означає вимога дати дорогу?", options: ["Вимога до учасника дорожнього руху не продовжувати або не відновлювати рух, якщо це може примусити інших учасників дорожнього руху, які мають перевагу, змінити напрямок руху або швидкість.", "Вимога до учасника дорожнього руху не здійснювати будь-яких маневрів (за винятком вимоги звільнити займану смугу руху), якщо це може примусити інших учасників дорожнього руху, які мають перевагу, змінити напрямок руху або швидкість.", "Відповідь 1 і 2."], correctAnswer: 2 },
          { sourceNumber: 7, question: "Поздовжня смуга на проїзній частині завширшки щонайменше 2,75 м, що позначена або не позначена дорожньою розміткою і призначена для руху нерейкових транспортних засобів це:", options: ["Розділювальна смуга.", "Смуга руху.", "Трамвайна колія."], correctAnswer: 1 },
          { sourceNumber: 8, question: "Які із наведених категорій осіб, належать до визначення «учасник дорожнього руху»?", options: ["Регулювальник, пішоходи, водії, пасажири, велосипедисти, а також особи, які рухаються в кріслі колісному.", "Пішоходи, водії, пасажири, погоничі тварин, велосипедисти, а також особи, які рухаються в кріслі колісному.", "Пішоходи, водії, пасажири, погоничі тварин, велосипедисти та регулювальник."], correctAnswer: 1 },
          { sourceNumber: 9, question: "Яка із наведених категорій осіб бере участь у дорожньому русі поза транспортними засобами та не виконує на дорозі будь-яку роботу:", options: ["Пішохід.", "Пасажир.", "Регулювальник."], correctAnswer: 0 },
          { sourceNumber: 10, question: "Особа, яка користується транспортним засобом і перебуває в ньому, але не причетна до керування ним, це:", options: ["Пасажир.", "Пішохід.", "Особа, яка рухається в кріслі колісному."], correctAnswer: 0 }
        ]
      },
      {
        id: "duties",
        number: "02",
        title: "Обов’язки і права водіїв",
        description: "ДТП, документи, ремені безпеки, медогляд, права та обов’язки водія.",
        questions: [
          { sourceNumber: 1, question: "У разі, якщо неможливо вжити заходи для надання домедичної допомоги потерпілому та викликати бригаду екстреної (швидкої) медичної допомоги, а також якщо з місця ДТП немає можливості відправити потерпілого до лікувального закладу за допомогою інших осіб, водій зобов'язаний:", options: ["Не залишати місце дорожньо-транспортної пригоди і чекати будь-який транспортний засіб, що рухається в попутному напрямку, для доставки потерпілого.", "Відвезти потерпілого в найближчий лікувальний заклад своїм транспортним засобом, попередньо зафіксувавши розташування слідів пригоди, в лікувальному закладі повідомити своє прізвище та номерний знак транспортного засобу і повернутися на місце події."], correctAnswer: 1 },
          { sourceNumber: 2, question: "Що з переліченого в першу чергу зобов’язаний зробити причетний до дорожньо-транспортної пригоди водій, якщо в результаті події є потерпілі особи?", options: ["Прибрати транспортний засіб за межі дороги.", "Повідомити про дорожньо-транспортну пригоду поліцію і чекати прибуття поліцейських.", "Вжити можливих заходів для надання домедичної допомоги потерпілим, викликати швидку.", "Вжити всіх можливих заходів для збереження слідів пригоди."], correctAnswer: 2 },
          { sourceNumber: 3, question: "Що зобов'язаний зробити водій, який став учасником дорожньо-транспортної пригоди?", options: ["Негайно зупинити транспортний засіб і залишатися на місці пригоди, увімкнути аварійну сигналізацію і встановити знак аварійної зупинки.", "Надати домедичну допомогу і викликати швидку.", "Повідомити про те, що сталося, поліцію.", "Усе перелічене вище."], correctAnswer: 3 },
          { sourceNumber: 4, question: "Кому дозволено зупинку і стоянку в зоні дії знака «Зупинку заборонено» за наявності під ним таблички «Крім осіб з інвалідністю»?", options: ["Мотоколяскам та автомобілям, на яких встановлено розпізнавальний знак «Водій з інвалідністю».", "Таксі, що здійснюють посадку або висадку пасажирів.", "Мотоциклам і мопедам.", "Відповіді, зазначені в пунктах 1, 2."], correctAnswer: 3 },
          { sourceNumber: 5, question: "Хто може вимагати від водія проходження в установленому порядку медичного огляду для визначення стану алкогольного сп’яніння, впливу наркотичних чи токсичних речовин?", options: ["Лікар карети швидкої допомоги.", "Поліцейський і страховий агент.", "Поліцейський.", "Відповіді 2 і 3."], correctAnswer: 2 },
          { sourceNumber: 6, question: "З якого віку надається право на керування транспортними засобами категорії В?", options: ["З 16 років.", "З 18 років.", "З 19 років.", "З 21 року."], correctAnswer: 1 },
          { sourceNumber: 7, question: "Якими засобами пасивної безпеки зобов'язані користуватися водії і пасажири автомобілів, обладнаних такими засобами?", options: ["Підголівниками.", "Ременями безпеки.", "Підлокітниками.", "Відповіді 1 і 2."], correctAnswer: 3 },
          { sourceNumber: 8, question: "Документи, які повинен пред’явити для перевірки водій на вимогу поліцейського:", options: ["Посвідчення водія та реєстраційний документ.", "Чинний страховий поліс.", "Дійсну медичну довідку.", "Відповіді 1, 2 і 3.", "Відповіді, зазначені в пунктах 1 і 2."], correctAnswer: 4 },
          { sourceNumber: 9, question: "Чи дозволено керувати транспортним засобом, якщо водій перебуває в хворобливому стані, який ставить під загрозу безпеку дорожнього руху?", options: ["Дозволено під впливом лікарських засобів, що підвищують увагу.", "Дозволено в будь-якому випадку.", "Заборонено."], correctAnswer: 2 },
          { sourceNumber: 10, question: "Водій має право:", options: ["Керувати транспортним засобом там, де рух не заборонено.", "Знати причину зупинки, перевірки та огляду.", "Оскаржити дії поліцейського.", "Усе перелічене вище."], correctAnswer: 3 }
        ]
      },
      {
        id: "signals",
        number: "03",
        title: "Рух транспортних засобів із спеціальними сигналами",
        description: "Проблискові маячки, оперативний транспорт, колони, надання переваги.",
        questions: [
          { sourceNumber: 1, question: "Чи повинен водій автомобіля, рухаючись по головній дорозі, дати дорогу транспортному засобу з увімкненим синім проблисковим маячком?", options: ["Не повинен.", "Повинен."], correctAnswer: 1 },
          { sourceNumber: 2, question: "Чи повинен водій транспортного засобу з увімкненим проблисковим маячком синього кольору, що рухається на спуск, де зустрічний роз'їзд утруднено, дати дорогу транспортним засобам, які рухаються на підйом?", options: ["Повинен.", "Не повинен."], correctAnswer: 1 },
          { sourceNumber: 3, question: "Наближаючись до нерухомого автомобіля з увімкненим проблисковим маячком синього кольору, що стоїть на узбіччі або на проїзній частині, водій повинен:", options: ["Не знижуючи швидкості, продовжити рух.", "Зупинитися біля правого краю.", "Знизити швидкість до 40 км/год. і в разі подання сигналу зупинитися."], correctAnswer: 2 },

    ];

    let currentSection = null;
    let currentQuestionIndex = 0;
    let userAnswers = [];

    const sectionSelectView = document.getElementById("sectionSelectView");
    const quizView = document.getElementById("quizView");
    const resultView = document.getElementById("resultView");
    const sectionGrid = document.getElementById("sectionGrid");

    const quizSectionTitle = document.getElementById("quizSectionTitle");
    const quizSectionDesc = document.getElementById("quizSectionDesc");
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");
    const questionNumber = document.getElementById("questionNumber");
    const questionText = document.getElementById("questionText");
    const questionNote = document.getElementById("questionNote");
    const answersContainer = document.getElementById("answersContainer");

    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const backToSectionsBtn = document.getElementById("backToSectionsBtn");

    const resultScore = document.getElementById("resultScore");
    const resultMeta = document.getElementById("resultMeta");
    const resultStatus = document.getElementById("resultStatus");
    const retryBtn = document.getElementById("retryBtn");
    const backHomeBtn = document.getElementById("backHomeBtn");

    function renderSections() {
      sectionGrid.innerHTML = "";
      sections.forEach(section => {
        const card = document.createElement("div");
        card.className = "card section-card";
        const checkedCount = section.questions.filter(q => q.correctAnswer !== null && q.correctAnswer !== undefined).length;

        card.innerHTML = `
          <div class="section-number">${section.number}</div>
          <h3 class="section-title">${section.title}</h3>
          <p class="section-desc">${section.description}</p>
          <div class="section-meta">Питань: ${section.questions.length}</div>
          ${section.practiceMode ? `<div class="practice-badge">Режим практики</div>` : `<div class="section-meta">З перевіркою: ${checkedCount}</div>`}
        `;
        card.addEventListener("click", () => startSection(section.id));
        sectionGrid.appendChild(card);
      });
    }

    function startSection(sectionId) {
      currentSection = sections.find(s => s.id === sectionId);
      currentQuestionIndex = 0;
      userAnswers = new Array(currentSection.questions.length).fill(null);

      sectionSelectView.classList.add("hidden");
      resultView.classList.add("hidden");
      quizView.classList.remove("hidden");

      quizSectionTitle.textContent = `${currentSection.number}. ${currentSection.title}`;
      quizSectionDesc.textContent = currentSection.description;

      renderQuestion();
    }

    function renderQuestion() {
      const question = currentSection.questions[currentQuestionIndex];
      const savedAnswer = userAnswers[currentQuestionIndex];
      const hasKey = question.correctAnswer !== null && question.correctAnswer !== undefined;

      questionNumber.textContent = `Питання ${question.sourceNumber}`;
      questionText.textContent = question.question;
      answersContainer.innerHTML = "";

      if (!hasKey) {
        questionNote.classList.remove("hidden");
        questionNote.textContent = "Для цього питання ще не додано таблицю правильних відповідей. Можна проходити як практику.";
      } else {
        questionNote.classList.add("hidden");
        questionNote.textContent = "";
      }

      question.options.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.textContent = `${index + 1}) ${option}`;

        if (savedAnswer !== null) {
          btn.disabled = true;

          if (hasKey) {
            if (index === question.correctAnswer) btn.classList.add("correct");
            if (index === savedAnswer && savedAnswer !== question.correctAnswer) btn.classList.add("wrong");
          } else {
            if (index === savedAnswer) btn.classList.add("selected");
          }
        }

        btn.addEventListener("click", () => handleAnswer(index));
        answersContainer.appendChild(btn);
      });

      const progressPercent = ((currentQuestionIndex + 1) / currentSection.questions.length) * 100;
      progressBar.style.width = `${progressPercent}%`;
      progressText.textContent = `${currentQuestionIndex + 1} / ${currentSection.questions.length}`;

      prevBtn.disabled = currentQuestionIndex === 0;
      prevBtn.style.opacity = currentQuestionIndex === 0 ? "0.55" : "1";
      nextBtn.textContent =
        currentQuestionIndex === currentSection.questions.length - 1 ? "Завершити тест" : "Наступне →";
    }

    function handleAnswer(answerIndex) {
      if (userAnswers[currentQuestionIndex] !== null) return;
      userAnswers[currentQuestionIndex] = answerIndex;
      renderQuestion();
    }

    function goNext() {
      if (!currentSection) return;

      if (currentQuestionIndex < currentSection.questions.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
      } else {
        showResults();
      }
    }

    function goPrev() {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        renderQuestion();
      }
    }

    function showResults() {
      const total = currentSection.questions.length;
      const checkedQuestions = currentSection.questions.filter(q => q.correctAnswer !== null && q.correctAnswer !== undefined);
      const checkedTotal = checkedQuestions.length;
      let correct = 0;

      currentSection.questions.forEach((q, i) => {
        if (q.correctAnswer !== null && q.correctAnswer !== undefined && userAnswers[i] === q.correctAnswer) {
          correct++;
        }
      });

      quizView.classList.add("hidden");
      resultView.classList.remove("hidden");

      if (checkedTotal === 0) {
        resultScore.textContent = `${total} питань`;
        resultMeta.textContent = "Цей розділ працює в режимі практики. Після додавання ключів відповідей тут буде автоматична перевірка.";
        resultStatus.textContent = "Практичний режим";
        resultStatus.className = "result-status good";
        return;
      }

      const percent = Math.round((correct / checkedTotal) * 100);
      const withoutKeys = total - checkedTotal;

      resultScore.textContent = `${correct} / ${checkedTotal}`;
      resultMeta.textContent = withoutKeys > 0
        ? `Перевірено: ${checkedTotal}. Без ключів: ${withoutKeys}. Правильних відповідей: ${percent}%.`
        : `Правильних відповідей: ${percent}%.`;

      if (percent >= 80) {
        resultStatus.textContent = "Чудовий результат";
        resultStatus.className = "result-status good";
      } else {
        resultStatus.textContent = "Є над чим попрацювати";
        resultStatus.className = "result-status bad";
      }
    }

    function backToSections() {
      currentSection = null;
      currentQuestionIndex = 0;
      userAnswers = [];

      quizView.classList.add("hidden");
      resultView.classList.add("hidden");
      sectionSelectView.classList.remove("hidden");
    }

    prevBtn.addEventListener("click", goPrev);
    nextBtn.addEventListener("click", goNext);
    backToSectionsBtn.addEventListener("click", backToSections);
    backHomeBtn.addEventListener("click", backToSections);
    retryBtn.addEventListener("click", () => {
      if (currentSection) startSection(currentSection.id);
    });

    renderSections();
  </script>
