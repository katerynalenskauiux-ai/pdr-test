<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тест ПДР України</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #162033;
      --muted: #64748b;
      --border: #dbe4f0;
      --accent: #2563eb;
      --accent-2: #1d4ed8;
      --correct: #16a34a;
      --correct-bg: #dcfce7;
      --wrong: #dc2626;
      --wrong-bg: #fee2e2;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
      color: white;
      padding: 28px 20px 22px;
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.22);
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .title {
      margin: 0 0 8px;
      font-size: clamp(24px, 3vw, 36px);
      font-weight: 700;
    }

    .subtitle {
      margin: 0;
      opacity: .9;
      font-size: 14px;
    }

    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .toolbar-left,
    .toolbar-right {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pill {
      background: white;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      box-shadow: var(--shadow);
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: .2s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-2);
    }

    .btn-secondary {
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: #f8fafc;
    }

    .hidden {
      display: none !important;
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 16px;
    }

    .section-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
      transition: .2s ease;
    }

    .section-card:hover {
      transform: translateY(-2px);
    }

    .section-number {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 10px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 10px;
    }

    .section-meta {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .progress-wrap {
      width: 100%;
      height: 8px;
      background: #dbeafe;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      background: #4ade80;
      width: 0%;
      transition: width .25s ease;
    }

    .quiz-header-card,
    .question-card,
    .result-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .quiz-header-card {
      padding: 20px;
      margin-bottom: 18px;
    }

    .quiz-section-title {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .quiz-section-desc {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .questions {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .question-card {
      padding: 20px;
    }

    .question-top {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 10px;
    }

    .question-text {
      margin: 0 0 16px;
      font-size: 18px;
      line-height: 1.5;
      font-weight: 600;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      background: #f8fafc;
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 15px;
      line-height: 1.45;
      cursor: pointer;
      display: flex;
      gap: 10px;
      transition: .15s ease;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: #eff6ff;
    }

    .option-btn:disabled {
      cursor: default;
    }

    .option-letter {
      min-width: 26px;
      height: 26px;
      border-radius: 8px;
      background: #e2e8f0;
      color: #334155;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .option-btn.correct {
      background: var(--correct-bg);
      border-color: #86efac;
    }

    .option-btn.correct .option-letter {
      background: var(--correct);
      color: white;
    }

    .option-btn.wrong {
      background: var(--wrong-bg);
      border-color: #fca5a5;
    }

    .option-btn.wrong .option-letter {
      background: var(--wrong);
      color: white;
    }

    .feedback {
      margin-top: 12px;
      font-size: 14px;
      font-weight: 700;
    }

    .feedback.correct {
      color: var(--correct);
    }

    .feedback.wrong {
      color: var(--wrong);
    }

    .result-card {
      padding: 24px;
      margin-bottom: 20px;
      text-align: center;
    }

    .result-title {
      margin: 0 0 10px;
      font-size: 28px;
    }

    .result-text {
      margin: 0;
      font-size: 16px;
      color: var(--muted);
      line-height: 1.6;
    }

    @media (max-width: 640px) {
      .question-text {
        font-size: 16px;
      }
      .quiz-section-title {
        font-size: 20px;
      }
    }
  </style>
</head>

        "Ні, посадку (висадку) дозволяється здійснювати пасажирам з крайньої смуги проїзної частини (але не з боку суміжної смуги для руху), за умови, що це буде безпечно та не створить перешкод іншим учасникам руху."
      ],
      correctAnswer: 1
    }
  ]
}
      }
    ];

    let currentSection = null;
    let state = {
      answered: 0,
      correct: 0,
      wrong: 0
    };

    const sectionsView = document.getElementById("sectionsView");
    const quizView = document.getElementById("quizView");
    const sectionGrid = document.getElementById("sectionGrid");
    const questionsContainer = document.getElementById("questionsContainer");
    const quizSectionTitle = document.getElementById("quizSectionTitle");
    const quizSectionDesc = document.getElementById("quizSectionDesc");
    const progressFill = document.getElementById("progressFill");
    const resultCard = document.getElementById("resultCard");
    const resultText = document.getElementById("resultText");

    const backBtn = document.getElementById("backBtn");
    const retryBtn = document.getElementById("retryBtn");

    const sectionInfo = document.getElementById("sectionInfo");
    const answeredInfo = document.getElementById("answeredInfo");
    const correctInfo = document.getElementById("correctInfo");
    const wrongInfo = document.getElementById("wrongInfo");

    function renderSections() {
      sectionGrid.innerHTML = "";

      sections.forEach(section => {
        const card = document.createElement("div");
        card.className = "section-card";

        card.innerHTML = `
          <div class="section-number">Розділ ${section.number}</div>
          <h3 class="section-title">${section.title}</h3>
          <div class="section-meta">${section.description}</div>
          <button class="btn btn-primary">Почати тест</button>
        `;

        card.querySelector("button").addEventListener("click", () => startSection(section.id));
        sectionGrid.appendChild(card);
      });
    }

    function startSection(sectionId) {
      currentSection = structuredClone(sections.find(s => s.id === sectionId));
      state = { answered: 0, correct: 0, wrong: 0 };

      sectionsView.classList.add("hidden");
      quizView.classList.remove("hidden");
      backBtn.classList.remove("hidden");
      retryBtn.classList.remove("hidden");
      sectionInfo.classList.remove("hidden");
      answeredInfo.classList.remove("hidden");
      correctInfo.classList.remove("hidden");
      wrongInfo.classList.remove("hidden");
      resultCard.classList.add("hidden");

      quizSectionTitle.textContent = currentSection.title;
      quizSectionDesc.textContent = currentSection.description;
      sectionInfo.textContent = `Розділ: ${currentSection.title}`;

      renderQuestions();
      updateStats();
      updateProgress();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderQuestions() {
      questionsContainer.innerHTML = "";

      currentSection.questions.forEach((q, index) => {
        const card = document.createElement("div");
        card.className = "question-card";
        card.id = `question-${index}`;

        const top = document.createElement("div");
        top.className = "question-top";
        top.textContent = `Питання ${index + 1}${q.sourceNumber ? ` · оригінал №${q.sourceNumber}` : ""}`;

        const title = document.createElement("p");
        title.className = "question-text";
        title.textContent = q.question;

        const options = document.createElement("div");
        options.className = "options";

        const letters = ["А", "Б", "В", "Г", "Д", "Е"];

        q.options.forEach((optionText, optionIndex) => {
          const btn = document.createElement("button");
          btn.className = "option-btn";
          btn.innerHTML = `
            <span class="option-letter">${letters[optionIndex] || optionIndex + 1}</span>
            <span>${optionText}</span>
          `;

          btn.addEventListener("click", () => answerQuestion(index, optionIndex));
          options.appendChild(btn);
        });

        const feedback = document.createElement("div");
        feedback.className = "feedback hidden";
        feedback.id = `feedback-${index}`;

        card.appendChild(top);
        card.appendChild(title);
        card.appendChild(options);
        card.appendChild(feedback);

        questionsContainer.appendChild(card);
      });
    }

    function answerQuestion(questionIndex, selectedIndex) {
      const question = currentSection.questions[questionIndex];

      if (question.answered) return;

      question.answered = true;
      question.selectedAnswer = selectedIndex;

      const card = document.getElementById(`question-${questionIndex}`);
      const buttons = card.querySelectorAll(".option-btn");
      const feedback = document.getElementById(`feedback-${questionIndex}`);

      buttons.forEach(btn => btn.disabled = true);

      const isCorrect = selectedIndex === question.correctAnswer;

      if (isCorrect) {
        buttons[selectedIndex].classList.add("correct");
        feedback.textContent = "Правильно";
        feedback.className = "feedback correct";
        state.correct++;
      } else {
        buttons[selectedIndex].classList.add("wrong");
        buttons[question.correctAnswer].classList.add("correct");
        feedback.textContent = "Неправильно";
        feedback.className = "feedback wrong";
        state.wrong++;
      }

      state.answered++;
      updateStats();
      updateProgress();

      if (state.answered === currentSection.questions.length) {
        showResult();
      }
    }

    function updateStats() {
      const total = currentSection ? currentSection.questions.length : 0;
      answeredInfo.textContent = `Пройдено: ${state.answered} / ${total}`;
      correctInfo.textContent = `Правильно: ${state.correct}`;
      wrongInfo.textContent = `Неправильно: ${state.wrong}`;
    }

    function updateProgress() {
      const total = currentSection ? currentSection.questions.length : 0;
      const percent = total ? (state.answered / total) * 100 : 0;
      progressFill.style.width = `${percent}%`;
    }

    function showResult() {
      const total = currentSection.questions.length;
      const percent = Math.round((state.correct / total) * 100);

      let label = "Добре";
      if (percent >= 90) label = "Відмінно";
      else if (percent < 60) label = "Потрібно ще потренуватись";

      resultText.textContent = `${label}. Ви відповіли правильно на ${state.correct} з ${total} питань (${percent}%).`;
      resultCard.classList.remove("hidden");
      resultCard.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function backToSections() {
      currentSection = null;
      state = { answered: 0, correct: 0, wrong: 0 };

      sectionsView.classList.remove("hidden");
      quizView.classList.add("hidden");
      backBtn.classList.add("hidden");
      retryBtn.classList.add("hidden");
      sectionInfo.classList.add("hidden");
      answeredInfo.classList.add("hidden");
      correctInfo.classList.add("hidden");
      wrongInfo.classList.add("hidden");
    }

    function retrySection() {
      if (!currentSection) return;
      startSection(currentSection.id);
    }

    backBtn.addEventListener("click", backToSections);
    retryBtn.addEventListener("click", retrySection);

    renderSections();
  </script>
</body>
</html>
